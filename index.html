<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEURONEX - Next Gen News Portal</title>
  <link rel="stylesheet" href="styles.css">

  <!-- Google AdSense -->
  <script async 
    src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4956249055263295"
    crossorigin="anonymous">
  </script>

</head>

<body>

  <!-- Theme toggle button -->
  <button id="theme-toggle" class="theme-btn">🌙 / ☀️</button>

  <!-- Site name -->
  <header class="site-header">
    <h1>NEURONEX</h1>
  </header>

  <!-- Search bar -->
  <div class="search-container">
    <input type="text" id="search-input" placeholder="Search news...">
    <button id="search-btn">Search</button>
  </div>

  <!-- Breaking news headline -->
  <section class="breaking-news">
    <h2>Breaking News:</h2>
    <p id="breaking-news">Loading...</p>
  </section>

  <!-- 🔥 TOP AD (HIGH PERFORMANCE) -->
  <div style="margin: 20px;">
    <ins class="adsbygoogle"
         style="display:block"
         data-ad-client="ca-pub-4956249055263295"
         data-ad-slot="1234567890"
         data-ad-format="auto"
         data-full-width-responsive="true"></ins>
  </div>

  <script>
    (adsbygoogle = window.adsbygoogle || []).push({});
  </script>

  <!-- Categories -->
  <section class="categories">
    <button class="cat-btn" data-category="sports">Sports</button>
    <button class="cat-btn" data-category="celebrities">Celebs</button>
    <button class="cat-btn" data-category="movies">Movies</button>
    <button class="cat-btn" data-category="economy">Economy</button>
    <button class="cat-btn" data-category="government">Governments</button>
    <button class="cat-btn" data-category="gossip">Gossip</button>
  </section>

  <!-- News articles container -->
  <section id="articles-container" class="articles-grid">
    <!-- Articles rendered dynamically -->
  </section>

  <!-- 🔥 MID-PAGE AD -->
  <div style="margin: 30px;">
    <ins class="adsbygoogle"
         style="display:block"
         data-ad-client="ca-pub-4956249055263295"
         data-ad-slot="1234567890"
         data-ad-format="fluid"
         data-ad-layout="in-article"></ins>
  </div>

  <script>
    (adsbygoogle = window.adsbygoogle || []).push({});
  </script>

  <!-- AI suggestions -->
  <aside class="suggestions">
    <h3>Suggested for You</h3>
    <div id="suggestions-container"></div>
  </aside>

  <!-- 🔥 BOTTOM AD -->
  <div style="margin: 20px;">
    <ins class="adsbygoogle"
         style="display:block"
         data-ad-client="ca-pub-4956249055263295"
         data-ad-slot="1234567890"
         data-ad-format="auto"
         data-full-width-responsive="true"></ins>
  </div>

  <script>
    (adsbygoogle = window.adsbygoogle || []).push({});
  </script>

  <!-- ✅ FOOTER (CRITICAL FOR ADSENSE APPROVAL) -->
  <footer style="text-align:center; padding:20px; margin-top:40px; font-size:14px;">
    <p>© 2026 NEURONEX</p>
    <p>
      <a href="/privacy.html">Privacy Policy</a> | 
      <a href="/about.html">About</a> | 
      <a href="/contact.html">Contact</a>
    </p>
  </footer>

  <!-- Scripts -->
  <script type="module" src="main.js"></script>

</body>
</html>
